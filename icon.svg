<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2230"/>
      <stop offset="100%" stop-color="#0f1419"/>
    </linearGradient>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#5ea8ff"/>
      <stop offset="50%"  stop-color="#a98cff"/>
      <stop offset="100%" stop-color="#ff8cb8"/>
    </linearGradient>
    <linearGradient id="card0" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e74c3c"/>
      <stop offset="100%" stop-color="#c0392b"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3498db"/>
      <stop offset="100%" stop-color="#2980b9"/>
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2ecc71"/>
      <stop offset="100%" stop-color="#27ae60"/>
    </linearGradient>
    <linearGradient id="card3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f1c40f"/>
      <stop offset="100%" stop-color="#d4ac0d"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- Board grid (6x6 cells, centered) -->
  <g transform="translate(68, 68)">
    <!-- Grid lines -->
    <rect width="376" height="376" rx="10" fill="#161e2c" stroke="#2a3a52" stroke-width="2"/>
    <!-- Horizontal lines -->
    <line x1="0" y1="62.7"  x2="376" y2="62.7"  stroke="#2a3a52" stroke-width="1" opacity="0.6"/>
    <line x1="0" y1="125.3" x2="376" y2="125.3" stroke="#2a3a52" stroke-width="1" opacity="0.6"/>
    <line x1="0" y1="188"   x2="376" y2="188"   stroke="#2a3a52" stroke-width="1" opacity="0.6"/>
    <line x1="0" y1="250.7" x2="376" y2="250.7" stroke="#2a3a52" stroke-width="1" opacity="0.6"/>
    <line x1="0" y1="313.3" x2="376" y2="313.3" stroke="#2a3a52" stroke-width="1" opacity="0.6"/>
    <!-- Vertical lines -->
    <line x1="62.7"  y1="0" x2="62.7"  y2="376" stroke="#2a3a52" stroke-width="1" opacity="0.6"/>
    <line x1="125.3" y1="0" x2="125.3" y2="376" stroke="#2a3a52" stroke-width="1" opacity="0.6"/>
    <line x1="188"   y1="0" x2="188"   y2="376" stroke="#2a3a52" stroke-width="1" opacity="0.6"/>
    <line x1="250.7" y1="0" x2="250.7" y2="376" stroke="#2a3a52" stroke-width="1" opacity="0.6"/>
    <line x1="313.3" y1="0" x2="313.3" y2="376" stroke="#2a3a52" stroke-width="1" opacity="0.6"/>

    <!-- Cards placed on board (4 players) -->
    <!-- Player 0 (red) -->
    <rect x="6"     y="6"     width="51" height="51" rx="5" fill="#f8f9fa" stroke="#e74c3c" stroke-width="3"/>
    <text x="31.5"  y="38"    text-anchor="middle" font-size="28" font-weight="900" fill="#c0392b">A</text>
    <rect x="68.7"  y="6"     width="51" height="51" rx="5" fill="#f8f9fa" stroke="#e74c3c" stroke-width="3"/>
    <text x="94.2"  y="38"    text-anchor="middle" font-size="28" font-weight="900" fill="#c0392b">K</text>
    <rect x="6"     y="68.7"  width="51" height="51" rx="5" fill="#f8f9fa" stroke="#e74c3c" stroke-width="3"/>
    <text x="31.5"  y="100.7" text-anchor="middle" font-size="28" font-weight="900" fill="#c0392b">Q</text>

    <!-- Player 1 (blue) -->
    <rect x="319.3" y="6"     width="51" height="51" rx="5" fill="#f8f9fa" stroke="#3498db" stroke-width="3"/>
    <text x="344.8" y="38"    text-anchor="middle" font-size="28" font-weight="900" fill="#2980b9">A</text>
    <rect x="256.7" y="6"     width="51" height="51" rx="5" fill="#f8f9fa" stroke="#3498db" stroke-width="3"/>
    <text x="282.2" y="38"    text-anchor="middle" font-size="28" font-weight="900" fill="#2980b9">K</text>
    <rect x="319.3" y="68.7"  width="51" height="51" rx="5" fill="#f8f9fa" stroke="#3498db" stroke-width="3"/>
    <text x="344.8" y="100.7" text-anchor="middle" font-size="28" font-weight="900" fill="#2980b9">Q</text>

    <!-- Player 2 (green) -->
    <rect x="6"     y="319.3" width="51" height="51" rx="5" fill="#f8f9fa" stroke="#2ecc71" stroke-width="3"/>
    <text x="31.5"  y="351.3" text-anchor="middle" font-size="28" font-weight="900" fill="#1a5c2e">A</text>
    <rect x="68.7"  y="319.3" width="51" height="51" rx="5" fill="#f8f9fa" stroke="#2ecc71" stroke-width="3"/>
    <text x="94.2"  y="351.3" text-anchor="middle" font-size="28" font-weight="900" fill="#1a5c2e">K</text>
    <rect x="6"     y="256.7" width="51" height="51" rx="5" fill="#f8f9fa" stroke="#2ecc71" stroke-width="3"/>
    <text x="31.5"  y="288.7" text-anchor="middle" font-size="28" font-weight="900" fill="#1a5c2e">Q</text>

    <!-- Player 3 (yellow) -->
    <rect x="319.3" y="319.3" width="51" height="51" rx="5" fill="#f8f9fa" stroke="#f1c40f" stroke-width="3"/>
    <text x="344.8" y="351.3" text-anchor="middle" font-size="28" font-weight="900" fill="#8b6914">A</text>
    <rect x="256.7" y="319.3" width="51" height="51" rx="5" fill="#f8f9fa" stroke="#f1c40f" stroke-width="3"/>
    <text x="282.2" y="351.3" text-anchor="middle" font-size="28" font-weight="900" fill="#8b6914">K</text>
    <rect x="319.3" y="256.7" width="51" height="51" rx="5" fill="#f8f9fa" stroke="#f1c40f" stroke-width="3"/>
    <text x="344.8" y="288.7" text-anchor="middle" font-size="28" font-weight="900" fill="#8b6914">Q</text>

    <!-- Center: L-i logo text -->
    <text x="188" y="210" text-anchor="middle" font-size="72" font-weight="900"
          fill="url(#logo-grad)" font-family="-apple-system,BlinkMacSystemFont,sans-serif"
          letter-spacing="2">Li</text>
  </g>
</svg>
