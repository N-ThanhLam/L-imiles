name: Auto Update Cache Buster

on:
  push:
    branches:
      - main  # メインブランチ名が master の場合は master に変更してください

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Inject Commit Hash into HTML
        run: |
          # HTML内のマニフェストファイルのURLに最新のコミットハッシュを付与する
          sed -i "s/manifest.webmanifest/manifest.webmanifest?v=${{ github.sha }}/g" L-imiles_modified.html

      - name: Deploy to GitHub Pages
        uses: Peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
